name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: iching-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: iching-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: iching-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: iching-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

      - name: Build
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} apps/cli/src/main.ts --outfile dist/${{ matrix.artifact }}

      - name: Smoke test (native only)
        if: matrix.target == 'bun-darwin-arm64' || matrix.target == 'bun-linux-x64'
        run: bun scripts/smoke-test.ts dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
