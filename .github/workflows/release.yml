name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: iching-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            artifact: iching-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: iching-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            artifact: iching-linux-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test

      - name: Build
        run: |
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} apps/cli/src/main.ts --outfile dist/${{ matrix.artifact }}

      - name: Smoke test (native only)
        if: matrix.target == 'bun-darwin-arm64' || matrix.target == 'bun-linux-x64'
        run: bun scripts/smoke-test.ts dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for npm trusted publishing (OIDC)
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Node 24 ships npm 11 (required for trusted publishing OIDC)
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile

      # Build the single-file bundle via scripts/bundle.ts (the same builder
      # used locally and by prepack): `bun build --target=node` + a node
      # shebang, so the published artifact runs under both `npx` and `bunx`.
      # NOT `--target=bun`, which emits Bun's __require shim and crashes on Node.
      - name: Bundle (node-target)
        run: bun run bundle

      - name: Prepare publish manifest
        run: |
          set -euo pipefail
          cp README.md LICENSE publish/
          VERSION=$(node -p "require('./package.json').version")
          cat > publish/package.json <<EOF
          {
            "name": "@pro-vi/iching",
            "version": "$VERSION",
            "description": "A contemplative I Ching TUI for the terminal.",
            "bin": "./iching.js",
            "files": ["iching.js", "README.md", "LICENSE"],
            "type": "module",
            "engines": { "node": ">=18", "bun": ">=1.0.0" },
            "keywords": ["iching", "i-ching", "yijing", "tui", "terminal", "divination", "node", "bun"],
            "repository": { "type": "git", "url": "git+https://github.com/pro-vi/iching.git" },
            "homepage": "https://github.com/pro-vi/iching#readme",
            "bugs": { "url": "https://github.com/pro-vi/iching/issues" },
            "license": "MIT",
            "author": "provi",
            "publishConfig": { "access": "public" }
          }
          EOF

      - name: Publish to npm with provenance
        run: cd publish && npm publish --provenance --access public
